<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Preview Card</title>
  <desc id="desc">Stylized preview card linking to Pranav Mishra live portfolio website</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1228"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg2)"/>
  <circle cx="1060" cy="140" r="220" fill="#f59e0b" opacity="0.13"/>
  <circle cx="170" cy="620" r="220" fill="#22d3ee" opacity="0.12"/>

  <rect x="90" y="80" width="1100" height="560" rx="28" fill="#0b1020" stroke="url(#accent2)" stroke-width="2" filter="url(#shadow2)"/>

  <rect x="140" y="145" width="1000" height="420" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="140" y="145" width="1000" height="44" rx="18" fill="#1f2937"/>
  <circle cx="175" cy="167" r="8" fill="#ef4444"/>
  <circle cx="200" cy="167" r="8" fill="#f59e0b"/>
  <circle cx="225" cy="167" r="8" fill="#22c55e"/>

  <text x="260" y="173" fill="#93c5fd" font-size="20" font-family="Consolas, Menlo, monospace">
    portfolio-pranav-mishra-paranoid.vercel.app
  </text>

  <text x="190" y="285" fill="#f8fafc" font-size="62" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Live Portfolio
  </text>
  <text x="190" y="340" fill="#cbd5e1" font-size="30" font-family="Segoe UI, Arial, sans-serif">
    Project highlights - research - engineering work
  </text>
  <text x="190" y="385" fill="#94a3b8" font-size="28" font-family="Segoe UI, Arial, sans-serif">
    Open the website for the full interactive experience
  </text>

  <rect x="190" y="440" width="390" height="72" rx="36" fill="url(#accent2)"/>
  <text x="228" y="487" fill="#111827" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Visit Portfolio Live
  </text>
</svg>

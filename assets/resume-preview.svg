<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Resume Preview Card</title>
  <desc id="desc">Stylized preview card linking to Pranav Mishra resume PDF</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090f1f"/>
      <stop offset="100%" stop-color="#132341"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1120" cy="130" r="240" fill="#1d4ed8" opacity="0.14"/>
  <circle cx="130" cy="630" r="200" fill="#22d3ee" opacity="0.12"/>

  <rect x="90" y="80" width="1100" height="560" rx="28" fill="#0b1224" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>

  <rect x="150" y="150" width="110" height="140" rx="12" fill="#111c36" stroke="#334155" stroke-width="2"/>
  <line x1="175" y1="188" x2="235" y2="188" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  <line x1="175" y1="218" x2="235" y2="218" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <line x1="175" y1="248" x2="225" y2="248" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>

  <text x="300" y="200" fill="#22d3ee" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Resume</text>
  <text x="300" y="265" fill="#f8fafc" font-size="64" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pranav Mishra</text>
  <text x="300" y="320" fill="#93c5fd" font-size="30" font-family="Consolas, Menlo, monospace">RESUME Pranav_Mishra.pdf</text>

  <rect x="300" y="380" width="365" height="70" rx="35" fill="url(#accent)"/>
  <text x="335" y="426" fill="#0b1224" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Open PDF on GitHub</text>

  <text x="150" y="560" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">
    GitHub README does not support full inline PDF viewers.
  </text>
  <text x="150" y="595" fill="#e2e8f0" font-size="24" font-family="Segoe UI, Arial, sans-serif">
    Click this card to view or download the resume.
  </text>
</svg>
